name: AI PM Auto Blog

on:
  issues:
    types: [opened]

jobs:
  handle-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Handle AI PM Issue
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import os, json, re, requests

          GEMINI_API_KEY = os.environ['GEMINI_API_KEY']
          CRON_SECRET = os.environ.get('CRON_SECRET', '')
          GITHUB_TOKEN = os.environ['GITHUB_TOKEN']
          ISSUE_TITLE = os.environ['ISSUE_TITLE']
          ISSUE_BODY = os.environ['ISSUE_BODY']
          ISSUE_NUMBER = os.environ['ISSUE_NUMBER']
          REPO = os.environ['REPO']

          if '[AI PM]' not in ISSUE_TITLE:
              exit(0)

          BLOG_KEYWORDS = ['블로그', 'blog', '콘텐츠', 'content', '발행', '포스트', 'post', '작성', 'seo']
          text = (ISSUE_TITLE + ' ' + ISSUE_BODY).lower()
          is_blog = any(kw in text for kw in BLOG_KEYWORDS)

          def gh_comment(body):
              requests.post(
                  f'https://api.github.com/repos/{REPO}/issues/{ISSUE_NUMBER}/comments',
                  headers={'Authorization': f'Bearer {GITHUB_TOKEN}', 'Accept': 'application/vnd.github+json'},
                  json={'body': body}
              )

          def gh_close():
              requests.patch(
                  f'https://api.github.com/repos/{REPO}/issues/{ISSUE_NUMBER}',
                  headers={'Authorization': f'Bearer {GITHUB_TOKEN}', 'Accept': 'application/vnd.github+json'},
                  json={'state': 'closed'}
              )

          def gh_label(label):
              requests.post(
                  f'https://api.github.com/repos/{REPO}/issues/{ISSUE_NUMBER}/labels',
                  headers={'Authorization': f'Bearer {GITHUB_TOKEN}', 'Accept': 'application/vnd.github+json'},
                  json={'labels': [label]}
              )

          if is_blog:
              topic = re.sub(r'\[AI PM\]', '', ISSUE_TITLE).strip()
              count_match = re.search(r'(\d+)\s*개', ISSUE_TITLE + ISSUE_BODY)
              count = int(count_match.group(1)) if count_match else 1
              count = min(count, 3)

              # Detect language
              lang = 'en' if any(w in text for w in ['english', ' en ']) else 'ja' if '일본' in text else 'ko'

              # Trigger blog cron for immediate generation
              success = False
              try:
                  res = requests.get(
                      'https://growweb.me/api/blog/cron',
                      headers={'Authorization': f'Bearer {CRON_SECRET}'},
                      timeout=120
                  )
                  print(f'Cron triggered: {res.status_code}')
                  success = res.status_code == 200
              except Exception as e:
                  print(f'Cron error: {e}')

              if success:
                  gh_comment(f'✅ **AI PM 블로그 생성 완료**\n\n- 주제: {topic}\n- 대상: growweb.me/blog\n- 예약열 계실입니다.')
                  gh_close()
              else:
                  gh_comment(f'⚠️ 블로그 자동 트리거 실패.\n\n주제 **"{topic}"** 에 대한 블로그를 수동으로 작성해주세요.')
          else:
              gh_label('needs-dev')
              gh_comment('🔧 **코드 개발 이슈**\n\n대시보드에서 검토 후 처리됩니다.')
          PYEOF
